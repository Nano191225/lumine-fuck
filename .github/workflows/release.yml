name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      CERTIFICATE_PFX: ${{ secrets.CERTIFICATE_PFX }}
      CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore src/LumineFuck/LumineFuck.csproj

      - name: Set version (strip leading 'v')
        id: version
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Publish application
        run: |
          dotnet publish src/LumineFuck/LumineFuck.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -o publish/

      - name: Decode certificate
        if: env.CERTIFICATE_PFX != ''
        run: |
          $certBytes = [Convert]::FromBase64String($env:CERTIFICATE_PFX)
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", $certBytes)

      - name: Sign executable
        if: env.CERTIFICATE_PFX != ''
        run: |
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" | Select-Object -First 1
          & $signtool.FullName sign /f "$env:RUNNER_TEMP\cert.pfx" /p $env:CERTIFICATE_PASSWORD /fd sha256 /tr http://timestamp.digicert.com /td sha256 publish/LumineFuck.exe

      - name: Build Velopack release
        run: |
          dotnet tool install -g vpk
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" | Select-Object -First 1
          vpk download github `
            --outputDir releases/ `
            --repoUrl https://github.com/Nano191225/lumine-fuck `
            --token ${{ secrets.GITHUB_TOKEN }}
          if ($env:CERTIFICATE_PFX -ne '') {
            vpk pack `
              --packId LumineFuck `
              --packVersion ${{ steps.version.outputs.VERSION }} `
              --packDir publish/ `
              --mainExe LumineFuck.exe `
              --outputDir releases/ `
              --signParams "/f `"$env:RUNNER_TEMP\cert.pfx`" /p `"$env:CERTIFICATE_PASSWORD`" /fd sha256 /tr http://timestamp.digicert.com /td sha256"
          } else {
            vpk pack `
              --packId LumineFuck `
              --packVersion ${{ steps.version.outputs.VERSION }} `
              --packDir publish/ `
              --mainExe LumineFuck.exe `
              --outputDir releases/
          }
          vpk upload github `
            --outputDir releases/ `
            --repoUrl https://github.com/Nano191225/lumine-fuck `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --tag ${{ github.ref_name }} `
            --merge

      - name: Clean up certificate
        if: always()
        run: Remove-Item "$env:RUNNER_TEMP\cert.pfx" -ErrorAction SilentlyContinue
